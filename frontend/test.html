<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ECharts Graph Test</title>
    <script src="https://cdn.staticfile.org/echarts/5.4.3/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #chart { width: 100vw; height: 100vh; background: #1a1a2e; }
        #log { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; font-family: monospace; font-size: 12px; z-index: 999; }
    </style>
</head>
<body>
    <div id="log">Loading...</div>
    <div id="chart"></div>
    <script>
        function log(msg) {
            document.getElementById("log").innerHTML += msg + "<br>";
            console.log(msg);
        }

        window.onload = function() {
            log("Page loaded");
            log("echarts object: " + (typeof echarts));

            try {
                var chartDom = document.getElementById("chart");
                var myChart = echarts.init(chartDom);
                log("Chart initialized");

                var option = {
                    tooltip: {},
                    series: [{
                        type: "graph",
                        layout: "force",
                        data: [
                            { id: "1", name: "节点1", category: 0, symbolSize: 20 },
                            { id: "2", name: "节点2", category: 1, symbolSize: 15 },
                            { id: "3", name: "节点3", category: 1, symbolSize: 15 },
                            { id: "4", name: "节点4", category: 2, symbolSize: 25 },
                            { id: "5", name: "节点5", category: 2, symbolSize: 18 }
                        ],
                        links: [
                            { source: "1", target: "2" },
                            { source: "1", target: "3" },
                            { source: "4", target: "2" },
                            { source: "4", target: "5" },
                            { source: "5", target: "3" }
                        ],
                        categories: [
                            { name: "自己", itemStyle: { color: "#FFD700" } },
                            { name: "好友", itemStyle: { color: "#4A90D9" } },
                            { name: "群", itemStyle: { color: "#E74C3C" } }
                        ],
                        roam: true,
                        draggable: true,
                        label: {
                            show: true,
                            position: "right"
                        },
                        lineStyle: {
                            color: "source",
                            curveness: 0.1,
                            opacity: 0.4
                        },
                        emphasis: {
                            focus: "adjacency"
                        },
                        force: {
                            repulsion: 300,
                            edgeLength: [50, 150],
                            gravity: 0.1,
                            friction: 0.6
                        }
                    }]
                };

                log("Setting option...");
                myChart.setOption(option);
                log("SUCCESS! Chart rendered.");
            } catch (e) {
                log("ERROR: " + e.message);
                log("Stack: " + e.stack);
            }
        };
    </script>
</body>
</html>
